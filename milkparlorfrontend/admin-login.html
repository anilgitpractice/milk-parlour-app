<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Milk Parlour</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center font-sans">
  <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-extrabold text-slate-800">Admin Portal</h1>
      <p class="text-sm text-slate-500">Authorized personnel only.</p>
    </div>
    <form id="admin-form" onsubmit="handleAdminLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
        <input type="text" id="admin-user" required class="w-full p-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-800">
      </div>
      <div>
        <div class="flex justify-between items-center mb-1">
          <label class="block text-sm font-semibold text-slate-700">Password</label>
          <a href="#" onclick="alert('Please contact the System Administrator to reset your master password.')" class="text-xs text-indigo-600 hover:underline font-medium">Forgot password?</a>
        </div>
        <div class="relative">
          <input type="password" id="admin-pass" required class="w-full p-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-slate-800 pr-10">
          <button type="button" onclick="toggleAdminPassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="w-full bg-slate-800 text-white font-bold rounded-lg p-3 hover:bg-slate-900 transition-colors">
        Access Dashboard
      </button>
    </form>
  </div>

  <script>
    const API_BASE = "http://localhost:8000";
    function toggleAdminPassword() {
      const pwd = document.getElementById('admin-pass');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }

    async function handleAdminLogin(event) {
      event.preventDefault();
      const user = document.getElementById('admin-user').value;
      const pass = document.getElementById('admin-pass').value;

      try {
        const response = await fetch(`${API_BASE}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });

        if (response.ok) {
          // Give the browser a VIP pass
          localStorage.setItem('milk_admin_auth', 'true');
          window.location.href = 'index.html';
        } else {
          alert("Access Denied: Invalid credentials.");
        }
      } catch (error) {
        alert("Server error. Is the backend running?");
      }
    }
  </script>
</body>
</html>
