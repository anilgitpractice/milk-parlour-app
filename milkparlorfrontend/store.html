<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milk Parlour - Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
  <nav class="bg-indigo-600 text-white p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <img src="logo.png" alt="Logo" class="h-8 w-8 rounded-full bg-white p-0.5" onerror="this.style.display='none'">
        Milk Parlour
      </h1>
      <div class="flex items-center gap-4">
        <span id="welcome-text" class="text-sm font-medium hidden sm:block"></span>
        <a href="profile.html" class="text-sm text-indigo-100 hover:text-white font-semibold transition">Profile</a>
        <button onclick="logout()" class="text-sm bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-lg transition">Logout</button>
      </div>
  </nav>

  <main class="max-w-6xl mx-auto p-6 mt-6">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">Fresh Products</h2>
    <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <div class="col-span-full text-center text-slate-500 py-10">Loading products...</div>
    </div>

    <h2 class="text-2xl font-bold text-slate-800 mt-12 mb-6 border-t pt-8 border-slate-200">My Orders</h2>
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-sm">
              <th class="p-4 font-medium">Order ID</th>
              <th class="p-4 font-medium">Item</th>
              <th class="p-4 font-medium">Status</th>
              <th class="p-4 font-medium text-right">Action</th>
            </tr>
          </thead>
          <tbody id="my-orders-body" class="text-sm">
            <tr><td colspan="4" class="p-4 text-center text-slate-500">Loading your orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <h2 class="text-2xl font-bold text-slate-800 mt-12 mb-6 border-t pt-8 border-slate-200">Vacation Pause</h2>
    <div class="bg-indigo-50 p-6 rounded-xl border border-indigo-100">
      <p class="text-sm text-indigo-800 mb-4">Going out of town? Pause your daily milk deliveries here. We will notify the admin automatically.</p>
      <form id="pause-form" onsubmit="handlePause(event)" class="flex flex-col sm:flex-row gap-4 items-end">
        <div class="w-full sm:w-auto">
          <label class="block text-xs font-semibold text-indigo-700 mb-1">Start Date</label>
          <input type="date" id="pause-start" required class="p-2 border border-indigo-200 rounded-lg text-sm w-full focus:outline-none focus:border-indigo-500">
        </div>
        <div class="w-full sm:w-auto">
          <label class="block text-xs font-semibold text-indigo-700 mb-1">End Date</label>
          <input type="date" id="pause-end" required class="p-2 border border-indigo-200 rounded-lg text-sm w-full focus:outline-none focus:border-indigo-500">
        </div>
        <button type="submit" class="w-full sm:w-auto bg-indigo-600 text-white font-medium rounded-lg px-6 py-2 hover:bg-indigo-700 transition-colors text-sm">
          Pause Deliveries
        </button>
      </form>
    </div>
  </main>

  <script>
    const API_BASE = "http://localhost:8000";
    
    // 1. Check Login Status
    const userStr = localStorage.getItem('milk_user');
    if (!userStr) {
      window.location.href = 'login.html'; // Kick them out if not logged in
    } else {
      const user = JSON.parse(userStr);
      document.getElementById('welcome-text').innerText = `Hello, ${user.name}!`;
    }

    // 2. Logout Function
    function logout() {
      localStorage.removeItem('milk_user');
      window.location.href = 'login.html';
    }

    // 3. Load Products from Database
    async function loadProducts() {
      try {
        const response = await fetch(`${API_BASE}/api/products`);
        if (response.ok) {
          const products = await response.json();
          const grid = document.getElementById('products-grid');
          grid.innerHTML = ''; 

          if (products.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10">No products available right now.</div>';
            return;
          }

          products.forEach(product => {
            grid.innerHTML += `
              <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col">
                <h3 class="text-lg font-bold text-slate-800">${product.name}</h3>
                <p class="text-2xl font-extrabold text-indigo-600 mt-2 mb-1">₹${product.price.toFixed(2)}</p>
                <p class="text-sm text-slate-500 mb-4">Available: ${product.stock}</p>
                <button onclick="placeOrder('${product.name}')" class="mt-auto w-full bg-indigo-50 text-indigo-700 font-semibold py-2 rounded-lg hover:bg-indigo-600 hover:text-white transition-colors border border-indigo-100">
                  Order Now
                </button>
              </div>
            `;
          });
        }
      } catch (error) {
        console.error("Failed to load products:", error);
      }
    }

    async function placeOrder(itemName) {
      // 1. Get the logged-in user's name
      const userStr = localStorage.getItem('milk_user');
      if (!userStr) {
        alert("Please log in to place an order.");
        window.location.href = 'login.html';
        return;
      }
      const user = JSON.parse(userStr);

      // 2. Prepare the order data
      const orderData = {
        customer_name: user.name,
        item: itemName,
        status: "Pending"
      };

      // 3. Send the order to the backend
      try {
        const response = await fetch(`${API_BASE}/api/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });

        if (response.ok) {
          alert(`Success! Your order for ${itemName} has been sent to the parlour.`);
          loadMyOrders();
        } else {
          alert("Failed to place order. Please try again.");
        }
      } catch (error) {
        console.error("Order error:", error);
        alert("Could not connect to the server.");
      }
    }
    async function handlePause(event) {
      event.preventDefault();
      
      const userStr = localStorage.getItem('milk_user');
      if (!userStr) return;
      const user = JSON.parse(userStr);

      const startDate = document.getElementById('pause-start').value;
      const endDate = document.getElementById('pause-end').value;

      try {
        const response = await fetch(`${API_BASE}/api/customers/pause`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_name: user.name,
            start_date: startDate,
            end_date: endDate
          })
        });

        if (response.ok) {
          alert(`Success! Your deliveries are paused from ${startDate} to ${endDate}.`);
          document.getElementById('pause-form').reset();
        } else {
          alert("Could not pause subscription. Please contact support.");
        }
      } catch (error) {
        console.error("Pause error:", error);
      }
    }

    async function loadMyOrders() {
      const userStr = localStorage.getItem('milk_user');
      if (!userStr) return;
      const user = JSON.parse(userStr);

      try {
        const response = await fetch(`${API_BASE}/api/orders?customer_name=${encodeURIComponent(user.name)}`);
        if (response.ok) {
          const orders = await response.json();
          const tbody = document.getElementById('my-orders-body');
          tbody.innerHTML = '';

          if (orders.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' class='p-4 text-center text-slate-500'>You have not placed any orders yet.</td></tr>";
            return;
          }

          // Sort orders so newest are at the top
          orders.reverse().forEach(order => {
            let statusColor = 'bg-yellow-100 text-yellow-800'; 
            if (order.status === 'Delivered') statusColor = 'bg-emerald-100 text-emerald-800';
            if (order.status === 'Cancelled') statusColor = 'bg-red-100 text-red-800';

            let actionButton = '';
            // Only allow cancelling if it's still pending!
            if (order.status === 'Pending') {
              actionButton = `<button onclick="cancelOrder(${order.id})" class="text-xs text-red-600 hover:text-red-800 font-semibold hover:underline">Cancel Order</button>`;
            }

            tbody.innerHTML += `
              <tr class="border-b border-slate-50 hover:bg-slate-50">
                <td class="p-4 text-slate-600">#${order.id}</td>
                <td class="p-4 font-medium text-slate-800">${order.item}</td>
                <td class="p-4">
                  <span class="px-2 py-1 rounded-full text-xs font-semibold ${statusColor}">${order.status}</span>
                </td>
                <td class="p-4 text-right">${actionButton}</td>
              </tr>
            `;
          });
        }
      } catch (error) {
        console.error("Failed to load orders:", error);
      }
    }

    async function cancelOrder(orderId) {
      if (!confirm("Are you sure you want to cancel this order?")) return;
      
      try {
        const response = await fetch(`${API_BASE}/api/orders/${orderId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'Cancelled' })
        });
        
        if (response.ok) {
          loadMyOrders(); // Refresh the table to show the red badge!
        }
      } catch (error) {
        console.error("Error cancelling order:", error);
      }
    }

    loadProducts();
    loadMyOrders();
  </script>
</body>
</html>
