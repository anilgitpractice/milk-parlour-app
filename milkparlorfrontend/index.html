<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-slate-50 font-sans text-slate-800 overflow-hidden">
  
  <div class="flex h-screen w-full">
  
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm z-20 shrink-0">
      <div class="h-16 flex items-center px-6 border-b border-slate-100">
        <h1 class="text-lg font-extrabold flex items-center gap-2 text-indigo-900">
          <span class="bg-indigo-600 text-white px-2 py-1 rounded text-sm shadow-sm">MP</span>
          Milk Parlour
        </h1>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <p class="px-2 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Main Menu</p>
        
        <a href="#" onclick="showView('home')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-indigo-50 text-slate-700 hover:text-indigo-700 font-semibold transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          Dashboard
        </a>
        
        <a href="#" onclick="showView('orders')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
          Orders
        </a>
        
        <a href="#" onclick="showView('customers')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
          Customers
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50">
      
      <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-10 shrink-0 w-full">
        <h2 class="text-xl font-bold text-slate-800" id="page-title">Dashboard Overview</h2>
        
        <div class="relative">
          <button onclick="toggleProfileMenu()" class="flex items-center justify-center w-10 h-10 rounded-full bg-indigo-600 text-white font-bold text-lg hover:bg-indigo-700 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            A
          </button>
          
          <div id="profile-menu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden z-50">
            <div class="px-4 py-3 bg-slate-50 border-b border-slate-100">
              <p class="text-sm font-bold text-slate-800">System Admin</p>
              <p class="text-xs text-slate-500">Master Account</p>
            </div>
            <button onclick="adminLogout()" class="w-full text-left px-4 py-3 text-sm text-red-600 hover:bg-red-50 font-semibold flex items-center gap-2 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
              Sign Out
            </button>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto p-8" id="content">
        </main>
      
    </div>
  </div>

  <script>
    // SECURITY CHECK
    if (localStorage.getItem('milk_admin_auth') !== 'true') {
      window.location.href = 'admin-login.html';
    }

    function adminLogout() {
      localStorage.removeItem('milk_admin_auth');
      window.location.href = 'admin-login.html';
    }

    // PROFILE MENU LOGIC
    function toggleProfileMenu() {
      const menu = document.getElementById('profile-menu');
      menu.classList.toggle('hidden');
    }

    window.onclick = function(event) {
      if (!event.target.closest('.relative')) {
        const menu = document.getElementById('profile-menu');
        if (menu && !menu.classList.contains('hidden')) {
          menu.classList.add('hidden');
        }
      }
    }

    // API CONFIGURATION
    const API_BASE = "http://127.0.0.1:8000";
    let myChart = null; // Global chart tracker

    // VIEW TEMPLATES
    const views = {
      home: `
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
          <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
            <h3 class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Total Revenue</h3>
            <p id="revenue-display" class="text-2xl font-bold text-slate-800 mt-2">₹...</p>
          </div>
          <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
            <h3 class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Pending Orders</h3>
            <p id="orders-display" class="text-2xl font-bold text-slate-800 mt-2">...</p>
          </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mt-6">
        <h3 class="text-lg font-bold text-slate-800 mb-4">Sales by Product</h3>
        <canvas id="salesChart" height="80"></canvas>
      </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mt-6">
          <h2 class="text-lg font-semibold mb-4">Backend Connection Status</h2>
          <button onclick="testBackend()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg shadow-sm hover:bg-indigo-700 transition-colors text-sm font-medium">Ping Server</button>
          <div id="api-status" class="mt-4 p-3 bg-slate-50 rounded text-sm text-slate-600 font-mono hidden"></div>
        </div>
      `,
      orders: `
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-6">
          <h2 class="text-lg font-semibold mb-4">Create New Order</h2>
          <form id="add-order-form" onsubmit="submitOrder(event)" class="grid grid-cols-1 sm:grid-cols-4 gap-4">
            <input type="text" id="order-customer" placeholder="Customer Name" required class="p-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
            <select id="order-item" class="p-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 bg-white">
              <option value="1L Full Cream Milk">1L Full Cream Milk</option>
              <option value="500ml Toned Milk">500ml Toned Milk</option>
              <option value="250g Paneer">250g Paneer</option>
            </select>
            <select id="order-status" class="p-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 bg-white">
              <option value="Pending">Pending</option>
              <option value="Delivered">Delivered</option>
              <option value="Cancelled">Cancelled</option>
            </select>
            <button type="submit" class="bg-indigo-600 text-white font-medium rounded-lg p-2 hover:bg-indigo-700 transition-colors text-sm">Save Order</button>
          </form>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
          <h2 class="text-lg font-semibold mb-4">Today's Orders</h2>
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-slate-200 text-slate-500 text-sm">
                  <th class="p-3 font-medium">Order ID</th>
                  <th class="p-3 font-medium">Customer</th>
                  <th class="p-3 font-medium">Item</th>
                  <th class="p-3 font-medium">Status</th>
                  <th class="p-3 font-medium text-right">Action</th>
                </tr>
              </thead>
              <tbody id="orders-table-body" class="text-sm">
                <tr><td colspan="5" class="p-4 text-center text-slate-500">Loading orders...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      `,
      customers: `
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-6">
          <h2 class="text-lg font-semibold mb-4">Add New Customer</h2>
          <form id="add-customer-form" onsubmit="submitCustomer(event)" class="grid grid-cols-1 sm:grid-cols-4 gap-4">
            <input type="text" id="cust-name" placeholder="Full Name" required class="p-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
            <input type="text" id="cust-phone" placeholder="Phone Number" required class="p-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
            <select id="cust-sub" class="p-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 bg-white">
              <option value="Daily 1L">Daily 1L</option>
              <option value="Daily 500ml">Daily 500ml</option>
              <option value="Alternate Days 1L">Alternate Days 1L</option>
            </select>
            <button type="submit" class="bg-indigo-600 text-white font-medium rounded-lg p-2 hover:bg-indigo-700 transition-colors text-sm">Save Customer</button>
          </form>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
          <h2 class="text-lg font-semibold mb-4">Customer Directory</h2>
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-slate-200 text-slate-500 text-sm">
                  <th class="p-3 font-medium">Name</th>
                  <th class="p-3 font-medium">Phone</th>
                  <th class="p-3 font-medium">Subscription</th>
                  <th class="p-3 font-medium">Status</th>
                </tr>
              </thead>
              <tbody id="customers-table-body" class="text-sm">
                <tr><td colspan="4" class="p-4 text-center text-slate-500">Loading customers...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      `
    };

    // MASTER NAVIGATION LOGIC
    function showView(viewName) {
      const contentDiv = document.getElementById('content');
      const pageTitle = document.getElementById('page-title');

      if (!views || !views[viewName]) return;
      contentDiv.innerHTML = views[viewName];

      if (viewName === 'home') {
        pageTitle.innerText = 'Dashboard Overview';
        loadDashboardStats();
        loadChart();
      } else if (viewName === 'orders') {
        pageTitle.innerText = 'Order Management';
        loadOrders();
      } else if (viewName === 'customers') {
        pageTitle.innerText = 'Customer Directory';
        loadCustomers();
      }
    }

    // DASHBOARD DATA FETCHING
    async function loadDashboardStats() {
      try {
        const response = await fetch(`${API_BASE}/api/orders`);
        if (!response.ok) return;
        const orders = await response.json();

        let pendingCount = 0;
        let totalRevenue = 0;

        orders.forEach(order => {
          if (order.status === 'Pending') pendingCount++;
          // Calculate revenue based on accepted/delivered orders (using a standard price for now)
          if (order.status === 'Accepted' || order.status === 'Delivered') {
            // Give it a generic 50 rupees per item if price isn't in DB yet
            totalRevenue += order.price || 50; 
          }
        });

        document.getElementById('orders-display').innerText = pendingCount;
        document.getElementById('revenue-display').innerText = `₹${totalRevenue.toFixed(2)}`;
      } catch (error) {
        console.error("Failed to load stats:", error);
      }
    }

    async function loadChart() {
      try {
        const response = await fetch(`${API_BASE}/api/orders`);
        if (!response.ok) return;
        const orders = await response.json();

        const itemCounts = {};
        orders.forEach(order => {
          itemCounts[order.item] = (itemCounts[order.item] || 0) + 1;
        });

        const ctx = document.getElementById('salesChart');
        if (!ctx) return; 

        if (myChart) myChart.destroy();

        myChart = new Chart(ctx.getContext('2d'), {
          type: 'bar',
          data: {
            labels: Object.keys(itemCounts),
            datasets: [{
              label: 'Number of Orders',
              data: Object.values(itemCounts),
              backgroundColor: 'rgba(79, 70, 229, 0.8)',
              borderColor: 'rgba(67, 56, 202, 1)',
              borderWidth: 1,
              borderRadius: 6
            }]
          },
          options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
      } catch (error) {
        console.error("Error loading chart:", error);
      }
    }

    // ORDERS LOGIC
    async function loadOrders() {
      const tbody = document.getElementById('orders-table-body');
      if (!tbody) return;

      tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-slate-500">Loading orders...</td></tr>`;

      try {
        const response = await fetch(`${API_BASE}/api/orders`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const orders = await response.json();

        if (!orders.length) {
          tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-slate-500">No orders found.</td></tr>`;
          return;
        }

        tbody.innerHTML = '';
        orders.forEach(order => {
          let statusColor = 'bg-yellow-100 text-yellow-800'; 
          if (order.status === 'Accepted') statusColor = 'bg-blue-100 text-blue-800';
          if (order.status === 'Delivered') statusColor = 'bg-emerald-100 text-emerald-800';
          if (order.status === 'Cancelled' || order.status === 'Rejected') statusColor = 'bg-red-100 text-red-800';

          let actionButton = '';
          if (order.status === 'Pending') {
            actionButton = `
              <div class="flex justify-end gap-2">
                <button onclick="updateOrderStatus(${order.id}, 'Accepted')" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 px-3 py-1.5 rounded-lg font-semibold transition-colors">Accept</button>
                <button onclick="updateOrderStatus(${order.id}, 'Rejected')" class="text-xs bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-3 py-1.5 rounded-lg font-semibold transition-colors">Reject</button>
              </div>`;
          } else if (order.status === 'Accepted') {
            actionButton = `<button onclick="updateOrderStatus(${order.id}, 'Delivered')" class="text-xs bg-emerald-50 text-emerald-600 hover:bg-emerald-100 border border-emerald-200 px-3 py-1.5 rounded-lg font-semibold transition-colors">Mark Delivered</button>`;
          }

          tbody.innerHTML += `
            <tr class="border-b border-slate-50 hover:bg-slate-50">
              <td class="p-3 text-slate-600">#${order.id}</td>
              <td class="p-3 font-medium text-slate-800">${order.customer_name}</td>
              <td class="p-3 text-slate-600">${order.item}</td>
              <td class="p-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusColor}">${order.status}</span></td>
              <td class="p-3 text-right">${actionButton}</td>
            </tr>
          `;
        });
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-600">Failed to load orders.</td></tr>`;
      }
    }

    async function updateOrderStatus(orderId, newStatus) {
      try {
        const response = await fetch(`${API_BASE}/api/orders/${orderId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });

        if (response.ok) {
          loadOrders(); 
        } else {
          alert("Failed to update order.");
        }
      } catch (error) {
        console.error("Error updating order:", error);
      }
    }

    async function submitOrder(event) {
      event.preventDefault();
      const newOrder = {
        customer_name: document.getElementById('order-customer').value,
        item: document.getElementById('order-item').value,
        status: document.getElementById('order-status').value
      };

      try {
        const response = await fetch(`${API_BASE}/api/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newOrder)
        });
        if (response.ok) {
          document.getElementById('add-order-form').reset();
          loadOrders();
        }
      } catch (error) {
        console.error("Failed to add order:", error);
      }
    }

    // CUSTOMERS LOGIC
    async function loadCustomers() {
      try {
        const response = await fetch(`${API_BASE}/api/customers`);
        if (response.ok) {
          const customers = await response.json();
          const tbody = document.getElementById('customers-table-body');
          tbody.innerHTML = ''; 
          
          customers.forEach(customer => {
            let statusColor = customer.status === 'Active' ? 'bg-emerald-100 text-emerald-800' : 'bg-slate-100 text-slate-800';
            tbody.innerHTML += `
              <tr class="border-b border-slate-50 hover:bg-slate-50">
                <td class="p-3 font-medium text-slate-800">${customer.name}</td>
                <td class="p-3 text-slate-600">${customer.phone}</td>
                <td class="p-3 text-slate-600">${customer.subscription}</td>
                <td class="p-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusColor}">${customer.status}</span></td>
              </tr>
            `;
          });
        }
      } catch (error) {
        console.error("Failed to load customers:", error);
      }
    }

    async function submitCustomer(event) {
      event.preventDefault(); 
      const newCustomer = {
        name: document.getElementById('cust-name').value,
        phone: document.getElementById('cust-phone').value,
        subscription: document.getElementById('cust-sub').value
      };

      try {
        const response = await fetch(`${API_BASE}/api/customers`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newCustomer)
        });
        if (response.ok) {
          document.getElementById('add-customer-form').reset();
          loadCustomers();
        }
      } catch (error) {
        console.error("Failed to add customer:", error);
      }
    }

    // TEST BACKEND
    async function testBackend() {
      const statusBox = document.getElementById('api-status');
      statusBox.classList.remove('hidden');
      statusBox.innerHTML = `Attempting fetch...`;
      try {
        const response = await fetch(`${API_BASE}/`); 
        if (response.ok) {
          statusBox.innerHTML = `<span class="text-emerald-600 font-bold">✓ Success!</span>`;
        } else {
          statusBox.innerHTML = `<span class="text-red-600 font-bold">✗ Error!</span>`;
        }
      } catch (error) {
        statusBox.innerHTML = `<span class="text-red-600 font-bold">✗ Fetch Failed!</span><br>Is the backend running?`;
      }
    }

    // Initialize App
    window.onload = () => {
      showView('home');
    };
  </script>
</body>
</html>
