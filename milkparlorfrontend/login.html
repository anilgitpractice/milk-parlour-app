<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fresh Milk Delivery - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <main class="min-h-screen flex items-center justify-center p-4">
      <section class="w-full max-w-md">
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 sm:p-8">
          <div class="text-center mb-6">
            <img src="logo.png" alt="Milk Parlour Logo" class="mx-auto h-20 w-auto mb-4 drop-shadow-sm rounded-full">
            <h1 class="text-3xl font-extrabold text-indigo-600 mb-2">Milk Parlour</h1>
            <p class="text-sm text-slate-500">Fresh milk delivered daily to your doorstep.</p>
          </div>
          <h2 id="auth-title" class="text-2xl font-bold text-slate-800 mb-6 text-center">Sign In</h2>
          <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4">
            <div id="name-field" class="hidden">
              <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
              <input type="text" id="auth-name" class="w-full p-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
              <input type="text" id="auth-phone" required class="w-full p-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                  <label class="block text-sm font-medium text-slate-700">Password</label>
                  <a href="#" id="forgot-pwd-link" class="text-xs text-indigo-600 hover:underline font-medium">Forgot password?</a>
                </div>
                <div class="relative">
                  <input type="password" id="auth-password" required class="w-full p-3 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 pr-10">
                  <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-indigo-600 transition-colors">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                  </button>
                </div>
              </div>
            <button type="submit" id="auth-submit" class="w-full bg-indigo-600 text-white font-medium rounded-lg p-3 hover:bg-indigo-700 transition-colors">Sign In</button>
          </form>
          <div class="mt-6 text-center text-sm text-slate-600">
            <span id="auth-toggle-text">Don't have an account?</span>
            <button onclick="toggleMode()" id="auth-toggle-btn" class="text-indigo-600 font-semibold hover:underline ml-1">Sign up</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const API_BASE = "http://localhost:8000";
      let isLogin = true;

      function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? 'Sign In' : 'Create Account';
        document.getElementById('auth-submit').innerText = isLogin ? 'Sign In' : 'Sign Up';
        document.getElementById('auth-toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
        document.getElementById('auth-toggle-btn').innerText = isLogin ? 'Sign up' : 'Sign in';
        document.getElementById('forgot-pwd-link').style.display = isLogin ? 'block' : 'none';
        
        const nameField = document.getElementById('name-field');
        if (isLogin) {
          nameField.classList.add('hidden');
          document.getElementById('auth-name').removeAttribute('required');
        } else {
          nameField.classList.remove('hidden');
          document.getElementById('auth-name').setAttribute('required', 'true');
        }
      }

      function togglePassword() {
          const pwdInput = document.getElementById('auth-password');
          if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
          } else {
            pwdInput.type = 'password';
          }
        }

      async function handleAuth(event) {
        event.preventDefault();
        
        const phone = document.getElementById('auth-phone').value;
        const password = document.getElementById('auth-password').value;
        const name = document.getElementById('auth-name').value;

        const endpoint = isLogin ? '/api/login' : '/api/signup';
        const payload = isLogin ? { phone, password } : { name, phone, password };

        try {
          const response = await fetch(`${API_BASE}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (response.ok) {
            // Save the user data in the browser
            localStorage.setItem('milk_user', JSON.stringify({ name: data.user_name, phone: data.phone }));
            
            // Redirect to the customer storefront!
            window.location.href = "store.html";
          } else {
            alert("Error: " + data.detail);
          }
        } catch (error) {
          console.error("Auth failed:", error);
          alert("Could not connect to the server.");
        }
      }
    </script>
  </body>
</html>
